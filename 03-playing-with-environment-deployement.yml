pool:
  vmImage: ubuntu-latest

stages: 
- stage: Build
  jobs:
  - job: BuildJob
    steps:
    - bash: echo "Do the job"

- stage: DevDeploy
  jobs:
  - deployment: DevDeploymentJob
    environment: Dev
    strategy:
      runOnce:
        deploy:
          steps:
            - script: echo deploy to dev

- stage: QADeploy
  jobs:
  - deployment: QADeploymentJob
    environment: QA
    strategy:
      runOnce:
        deploy:
          steps:
            - script: echo deploy to dev



